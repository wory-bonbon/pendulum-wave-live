<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pendulum Wave — Chrome Grid 30×30</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:sans-serif}
canvas{display:block}
#ui{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:12px;z-index:10}
#ui button{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#ccc;
  padding:8px 18px;border-radius:6px;cursor:pointer;font-size:13px;transition:all .2s}
#ui button:hover{background:rgba(255,255,255,0.15);color:#fff}
#ui button.active{background:rgba(255,255,255,0.2);color:#fff;border-color:rgba(255,255,255,0.4)}
#info{position:fixed;top:16px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.5);
  font-size:12px;letter-spacing:0.5px;z-index:10}
</style>
</head>
<body>
<div id="info">PENDULUM WAVE — 900 CHROME SPHERES — drag: rotate / scroll: zoom / right-drag: pan</div>
<div id="ui">
  <button id="btnWave" class="active">Wave</button>
  <button id="btnSpiral">Spiral</button>
  <button id="btnDiamond">Diamond</button>
  <button id="btnRadial">Radial</button>
  <button id="btnAutoOrbit" class="active" style="margin-left:12px;border-color:rgba(100,180,255,0.4)">Auto Orbit</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
const GRID = 30;
const COUNT = GRID * GRID;
const SPACING = 0.35;
const SWING = 0.6;
const BASE_SPEED = 1.2;

let scene, camera, renderer, clock, controls;
let spheres = [];
let wires = [];
let currentMode = 'wave';
let autoOrbit = true;

// Phase functions — determine the offset per sphere
const phaseFunctions = {
  wave: (row, col) => row * 0.22 + col * 0.15,
  spiral: (row, col) => {
    const cx = (GRID - 1) / 2, cy = (GRID - 1) / 2;
    const angle = Math.atan2(row - cy, col - cx);
    const dist = Math.sqrt((row - cy) ** 2 + (col - cx) ** 2);
    return angle * 0.8 + dist * 0.18;
  },
  diamond: (row, col) => {
    const cx = (GRID - 1) / 2, cy = (GRID - 1) / 2;
    return (Math.abs(row - cy) + Math.abs(col - cx)) * 0.2;
  },
  radial: (row, col) => {
    const cx = (GRID - 1) / 2, cy = (GRID - 1) / 2;
    return Math.sqrt((row - cy) ** 2 + (col - cx) ** 2) * 0.25;
  }
};

// Direction per sphere — each swings along a unique axis
function swingDirection(row, col) {
  const angle = (row * 0.17 + col * 0.23) * Math.PI * 2;
  return new THREE.Vector3(Math.cos(angle), 0, Math.sin(angle)).normalize();
}

function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a0f);

  camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 200);
  camera.position.set(0, 14, 16);
  camera.lookAt(0, -1, 0);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  document.body.appendChild(renderer.domElement);

  clock = new THREE.Clock();

  // OrbitControls — zoom, pan, rotate
  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.minDistance = 3;
  controls.maxDistance = 50;
  controls.maxPolarAngle = Math.PI * 0.85;
  controls.target.set(0, -0.5, 0);

  // Create chrome environment cubemap
  const envMap = createChromeEnvMap();

  // Sphere geometry (shared) — higher poly for smoother reflections
  const geo = new THREE.SphereGeometry(0.1, 48, 48);

  // Shared material — all spheres use same steel material
  const steelMat = new THREE.MeshStandardMaterial({
    metalness: 1.0,
    roughness: 0.05,
    envMap: envMap,
    envMapIntensity: 2.2,
    color: 0xdddddd,
  });

  // Create spheres
  const offsetX = -(GRID - 1) * SPACING / 2;
  const offsetZ = -(GRID - 1) * SPACING / 2;

  for (let r = 0; r < GRID; r++) {
    for (let c = 0; c < GRID; c++) {
      const baseX = offsetX + c * SPACING;
      const baseZ = offsetZ + r * SPACING;
      const baseY = 0;

      const mesh = new THREE.Mesh(geo, steelMat);
      mesh.position.set(baseX, baseY, baseZ);
      scene.add(mesh);

      // Wire (string) from ceiling
      const wireGeo = new THREE.BufferGeometry();
      const wirePositions = new Float32Array(6);
      wireGeo.setAttribute('position', new THREE.BufferAttribute(wirePositions, 3));
      const wireMat = new THREE.LineBasicMaterial({
        color: 0x333340,
        transparent: true,
        opacity: 0.3,
      });
      const wire = new THREE.Line(wireGeo, wireMat);
      scene.add(wire);

      spheres.push({
        mesh,
        baseX,
        baseZ,
        row: r,
        col: c,
        dir: swingDirection(r, c),
      });
      wires.push(wire);
    }
  }

  // Lighting — studio setup for realistic steel
  const ambient = new THREE.AmbientLight(0x333340, 0.5);
  scene.add(ambient);

  // Key light: warm, strong, from above-right
  const key = new THREE.DirectionalLight(0xfff5e8, 0.8);
  key.position.set(6, 12, 4);
  scene.add(key);

  // Fill light: cool, softer, from left
  const fill = new THREE.DirectionalLight(0xd0d8f0, 0.35);
  fill.position.set(-5, 8, -3);
  scene.add(fill);

  // Rim light: from behind, gives edge definition
  const rim = new THREE.DirectionalLight(0xffffff, 0.25);
  rim.position.set(0, 4, -10);
  scene.add(rim);

  // Ground bounce: subtle warm from below
  const bounce = new THREE.DirectionalLight(0xffe8d0, 0.1);
  bounce.position.set(0, -5, 0);
  scene.add(bounce);

  // UI
  document.querySelectorAll('#ui button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#ui button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentMode = btn.id.replace('btn', '').toLowerCase();
    });
  });

  // Auto Orbit toggle
  const btnAuto = document.getElementById('btnAutoOrbit');
  btnAuto.addEventListener('click', () => {
    autoOrbit = !autoOrbit;
    btnAuto.classList.toggle('active', autoOrbit);
    btnAuto.style.borderColor = autoOrbit ? 'rgba(100,180,255,0.4)' : 'rgba(255,255,255,0.15)';
  });

  window.addEventListener('resize', onResize);
}

function createChromeEnvMap() {
  const cubeRT = new THREE.WebGLCubeRenderTarget(512);
  const cubeCamera = new THREE.CubeCamera(0.1, 100, cubeRT);
  const envScene = new THREE.Scene();

  // Smooth studio room environment — mimics a real photography studio
  // with soft ceiling light, warm floor, and gradient walls
  const bgGeo = new THREE.SphereGeometry(50, 64, 64);
  const bgMat = new THREE.ShaderMaterial({
    vertexShader: `
      varying vec3 vDir;
      void main() {
        vDir = normalize((modelMatrix * vec4(position, 1.0)).xyz);
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }`,
    fragmentShader: `
      varying vec3 vDir;
      void main() {
        vec3 d = normalize(vDir);
        float y = d.y;

        // Base: smooth vertical gradient (dark floor to bright ceiling)
        // This creates the characteristic steel ball look — dark bottom half, bright top
        vec3 c = mix(
          vec3(0.04, 0.035, 0.03),   // warm dark floor
          vec3(0.85, 0.87, 0.9),     // bright ceiling
          smoothstep(-0.15, 0.6, y)
        );

        // Horizon band — slightly brighter (simulates wall/floor edge reflection)
        float horizon = exp(-pow((y + 0.05) * 4.0, 2.0));
        c += vec3(0.15, 0.14, 0.13) * horizon;

        // Broad soft overhead area light (large softbox feel)
        float overhead = smoothstep(0.3, 0.95, y);
        c += vec3(0.15, 0.15, 0.17) * overhead;

        // Two soft key lights — large, diffused (no sharp spots)
        // Key light: warm, from front-right-above
        float key = pow(max(0.0, dot(d, normalize(vec3(0.4, 0.7, 0.5)))), 8.0);
        c += vec3(0.4, 0.38, 0.35) * key;

        // Fill light: cool, from left-above
        float fill = pow(max(0.0, dot(d, normalize(vec3(-0.5, 0.6, -0.3)))), 6.0);
        c += vec3(0.2, 0.22, 0.28) * fill;

        // Subtle back light — rim highlight source
        float rim = pow(max(0.0, dot(d, normalize(vec3(0.0, 0.3, -0.9)))), 12.0);
        c += vec3(0.25, 0.25, 0.27) * rim;

        // Very subtle warm ground bounce
        float bounce = max(0.0, -y) * 0.08;
        c += vec3(0.12, 0.08, 0.05) * bounce;

        gl_FragColor = vec4(c, 1.0);
      }`,
    side: THREE.BackSide,
  });
  envScene.add(new THREE.Mesh(bgGeo, bgMat));

  cubeCamera.position.set(0, 0, 0);
  cubeCamera.update(renderer, envScene);
  return cubeRT.texture;
}

function animate() {
  requestAnimationFrame(animate);

  const t = clock.getElapsedTime() * BASE_SPEED;
  const CEIL_Y = 4.0;
  const phaseFn = phaseFunctions[currentMode];

  for (let i = 0; i < COUNT; i++) {
    const s = spheres[i];
    const phase = phaseFn(s.row, s.col);
    const swing = Math.sin(t + phase) * SWING;

    // Position = base + swing along unique direction
    s.mesh.position.x = s.baseX + s.dir.x * swing;
    s.mesh.position.z = s.baseZ + s.dir.z * swing;

    // Pendulum arc — slight Y dip at extremes
    const arcDip = (1 - Math.cos(t + phase)) * 0.04;
    s.mesh.position.y = -arcDip;

    // Update wire
    const wp = wires[i].geometry.attributes.position.array;
    wp[0] = s.baseX; wp[1] = CEIL_Y; wp[2] = s.baseZ;
    wp[3] = s.mesh.position.x; wp[4] = s.mesh.position.y; wp[5] = s.mesh.position.z;
    wires[i].geometry.attributes.position.needsUpdate = true;
  }

  // Camera
  if (autoOrbit) {
    const camAngle = t * 0.04;
    const camR = 18;
    camera.position.x = Math.sin(camAngle) * camR;
    camera.position.z = Math.cos(camAngle) * camR;
    camera.position.y = 10 + Math.sin(t * 0.06) * 3;
    controls.target.set(0, -0.5, 0);
  }
  controls.update();

  renderer.render(scene, camera);
}

function onResize() {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
}

init();
animate();
</script>
</body>
</html>
